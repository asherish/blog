name: Publish to dev.to

on:
  push:
    branches: [main]
    paths: ['articles_en/**']

concurrency:
  group: devto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Publish articles to dev.to
        run: npx tsx scripts/publish-to-devto.ts
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}

      - name: Commit mapping updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .devto-mapping.json
          git diff --staged --quiet || git commit -m "chore: update dev.to mapping"
          git push
