name: Scheduled Publish

on:
  schedule:
    # Run daily at 00:05 JST (15:05 UTC previous day)
    - cron: '5 15 * * *'
  workflow_dispatch:

concurrency:
  group: scheduled-publish
  cancel-in-progress: false

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Process scheduled articles
        id: schedule
        run: |
          output=$(npx tsx scripts/process-scheduled.ts)
          echo "$output"
          if echo "$output" | grep -q "Published [1-9]"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to dev.to
        if: steps.schedule.outputs.has_changes == 'true'
        run: npx tsx scripts/publish-to-devto.ts
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}

      - name: Commit and push
        if: steps.schedule.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ articles_en/ .devto-mapping.json
          git diff --staged --quiet || git commit -m "Publish scheduled articles"
          git push
